# application-dev.yaml — LOCAL DEVELOPMENT CONFIG
server:
  port: 8081          # production 8080 ni olmasin
  address: 0.0.0.0    # barcha interfeyslarga bind (phone ham ulanishi uchun)

app:
  verification:
    test-mode:
      enabled: true              # ✅ Test mode ON
      default-code: "123456"     # ✅ Fixed code for testing

  sms:
    enabled: false               # ✅ SMS disabled
    test-mode:
      log-only: true             # ✅ Only log, no API calls

  email:
    enabled: true                # ✅ Email enabled
    test-mode:
      log-only: false            # ✅ Send real emails (optional)

logging:
  level:
    uz.pravaimtihon: DEBUG       # ✅ Batafsil log
    org.springframework.security: DEBUG